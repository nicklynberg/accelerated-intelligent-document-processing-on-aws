# NOTE: By default, pytest runs ALL tests (both unit and integration).
# To run only unit tests (CI/CD safe, no AWS required):
#   pytest -m "not integration"
# To run only integration tests (requires AWS credentials):
#   pytest -m integration

[tool:pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (fast, mocked, no AWS required)
    integration: Integration tests (slow, real AWS, requires credentials)
    stack: Stack operation tests
    batch: Batch operation tests
    document: Document operation tests
    config: Config operation tests
    slow: Slow running tests

# Test output
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage
[coverage:run]
source = idp_sdk
omit = 
    */tests/*
    */test_*.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
